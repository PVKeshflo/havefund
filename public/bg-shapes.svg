<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" fill="none">
  <defs>
    <pattern id="studs" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <!-- Outer stud ring -->
      <circle cx="24" cy="24" r="16" stroke="#DC2626" stroke-width="2"/>
      <!-- Inner filled circle -->
      <circle cx="24" cy="24" r="9" fill="#DC2626" fill-opacity="0.2" stroke="#DC2626" stroke-width="1.5"/>
      <!-- Centre dot -->
      <circle cx="24" cy="24" r="3.5" fill="#DC2626"/>
    </pattern>
  </defs>
  <rect width="480" height="480" fill="url(#studs)"/>
</svg>
